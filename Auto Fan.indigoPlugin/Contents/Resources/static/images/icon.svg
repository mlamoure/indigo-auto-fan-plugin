<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180">
  <!-- Black rounded rectangle background -->
  <rect x="5" y="20" width="470" height="140" rx="18" ry="18" fill="#1a1a1a"/>

  <!-- AUTO FAN text -->
  <text x="30" y="108" font-family="'Georgia', 'Times New Roman', serif" font-size="74" font-weight="bold" fill="white" letter-spacing="3">
    <tspan style="font-variant: small-caps;">Auto Fan</tspan>
  </text>

  <!-- Subtitle -->
  <text x="32" y="142" font-family="'Georgia', 'Times New Roman', serif" font-size="17" fill="white" letter-spacing="1">
    For The Indigo Home Automation System
  </text>

  <!-- Ceiling fan icon - positioned overlapping top-right corner -->
  <g transform="translate(462, 30)" fill="white">
    <!-- Center hub -->
    <circle cx="0" cy="0" r="10" fill="white"/>
    <circle cx="0" cy="0" r="5" fill="#1a1a1a"/>

    <!-- 5 curved blades radiating from center -->
    <!-- Blade 1 - up -->
    <path d="M -4,-12 Q -8,-32 -22,-52 Q -10,-48 0,-32 Q 6,-48 18,-52 Q 8,-32 4,-12 Z"/>
    <!-- Blade 2 - upper right -->
    <path d="M 10,-6 Q 28,-16 50,-20 Q 42,-8 28,-2 Q 42,6 50,18 Q 28,10 10,6 Z"/>
    <!-- Blade 3 - lower right -->
    <path d="M 4,12 Q 14,28 18,50 Q 4,40 0,28 Q -6,40 -14,50 Q -8,28 -4,12 Z" transform="rotate(36, 0, 0)"/>
    <!-- Blade 4 - lower left -->
    <path d="M -10,6 Q -28,16 -50,20 Q -42,8 -28,2 Q -42,-6 -50,-18 Q -28,-10 -10,-6 Z" transform="rotate(8, 0, 0)"/>
    <!-- Blade 5 - upper left -->
    <path d="M -4,-12 Q -14,-28 -18,-50 Q -4,-40 0,-28 Q 6,-40 14,-50 Q 8,-28 4,-12 Z" transform="rotate(-36, 0, 0)"/>

    <!-- Curved motion lines -->
    <path d="M 32,-40 Q 48,-28 50,-8" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 38,-46 Q 54,-32 58,-10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M 44,-50 Q 60,-36 64,-12" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
