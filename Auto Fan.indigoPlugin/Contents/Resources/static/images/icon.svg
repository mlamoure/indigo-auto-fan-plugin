<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180">
  <!-- Black rounded rectangle background -->
  <rect x="5" y="20" width="470" height="140" rx="18" ry="18" fill="#1a1a1a"/>

  <!-- AUTO FAN text -->
  <text x="30" y="108" font-family="'Georgia', 'Times New Roman', serif" font-size="74" font-weight="bold" fill="white" letter-spacing="3">
    <tspan style="font-variant: small-caps;">Auto Fan</tspan>
  </text>

  <!-- Subtitle -->
  <text x="32" y="142" font-family="'Georgia', 'Times New Roman', serif" font-size="17" fill="white" letter-spacing="1">
    For The Indigo Home Automation System
  </text>

  <!-- Ceiling fan - bold, simple blades that read well at small sizes -->
  <g transform="translate(458, 20)" fill="white">

    <!--
      Each blade is a teardrop/petal: elliptical, wide in the middle,
      pointed at the hub end. Rotated 72° apart with slight clockwise
      skew (10°) for motion feel.
    -->
    <g transform="rotate(10, 0, 0)">
      <ellipse cx="0" cy="-36" rx="11" ry="26"/>
      <ellipse cx="0" cy="-36" rx="11" ry="26" transform="rotate(72, 0, 0)"/>
      <ellipse cx="0" cy="-36" rx="11" ry="26" transform="rotate(144, 0, 0)"/>
      <ellipse cx="0" cy="-36" rx="11" ry="26" transform="rotate(216, 0, 0)"/>
      <ellipse cx="0" cy="-36" rx="11" ry="26" transform="rotate(288, 0, 0)"/>
    </g>

    <!-- Center hub on top -->
    <circle cx="0" cy="0" r="14" fill="white"/>
    <circle cx="0" cy="0" r="7" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="3" fill="white"/>

    <!-- Motion arcs -->
    <path d="M 44,-50 Q 64,-34 68,-8" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M 52,-56 Q 72,-38 76,-10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M 60,-60 Q 78,-42 82,-12" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
